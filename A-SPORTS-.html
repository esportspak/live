<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: white;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        /* Announcement Bar */
        .announcement-bar {
            background: #f1f1f1;
            color: black;
            padding: 10px 0;
            overflow: hidden;
            width: 100%;
            position: relative;
            display: block;
        }

        .marquee {
            display: inline-block;
            white-space: nowrap;
            padding-left: 100%;
            animation: marquee 25s linear infinite; 
            font-size: 14px;
            font-weight: bold;
        }

        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }

        /* Video Container */
        .video-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; 
            height: 0;
            background: #000;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        /* Fixed Orange Player Button */
        .player-btn {
            background-color: #ff8c00; 
            color: white !important; /* Text color white hi rahega */
            padding: 12px 30px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            margin: 20px auto;
            display: inline-block;
            text-decoration: none; /* Link underline khatam karne ke liye */
            transition: background-color 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .player-btn:hover {
            background-color: #e67e00;
            color: white;
        }
    </style>
</head>
<body>

<div class="announcement-bar">
    <div class="marquee">
        ⚠️ DISCLAIMER: Esports does not stream any of the channels included in this website & application, all the streaming links are from third party websites available freely on the internet. We're just giving way to stream and all content is the copyright of their owner.
    </div>
</div>

<div id="myHeader" class="video-container">
    <iframe 
        src="https://taimoor.pro.bd/live/newcrichd/play.php?id=asports" 
        allow="autoplay; fullscreen" 
        allowfullscreen 
        referrerpolicy="origin">
    </iframe>
</div>

<a href="https://esportspk.rf.gd/A-sports1.html" class="player-btn">
    Player 2
</a>

<script>
    // Security Scripts
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('keydown', function(e) {
      if (e.keyCode === 123 || (e.ctrlKey && (e.key === 'u' || e.key === 'I'))) {
        e.preventDefault();
      }
    });
</script>

</body>
</html>
