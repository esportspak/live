<style>
    .announcement-bar {
        color: black;
        padding: 10px 0;
        overflow: hidden;
        white-space: nowrap;
        position: relative;
    }

    .marquee {
        display: inline-block;
        animation: marquee 65.00s linear infinite;
        padding-left: 100%;
    }

    @keyframes marquee {
        0% { transform: translateX(0); }
        100% { transform: translateX(-100%); }
    }

    .video-container {
        position: relative;
        width: 100%;
        max-width: 1200px;
        margin: auto;
        padding-top: 56.25%; /* 16:9 ratio */
        background: #000;
    }

    .video-container iframe {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border: 0;
    }
</style>

<div class="announcement-bar">
    <div class="marquee">
        ⚠️ DISCLAIMER: Esports does not stream any of the channels included in this website &amp; application, all the streaming links are from third party websites available freely on the internet. We're just giving way to stream and all content is the copyright of their owner.
    </div>
</div>

<div class="video-container">
    <iframe
        src="https://taimoor.pro.bd/live/crichd/play.php?id=ptvpk"
        title="Live Sports Streaming"
        frameborder="0"
        allowfullscreen
        referrerpolicy="origin"
        allow="autoplay; fullscreen"
        loading="lazy">
    </iframe>
</div>

<script type="text/javascript" src="//www.highperformanceformat.com/f9746dfef85e6ec5c7141e4723441071/invoke.js"></script>

<div id="myHeader">
    <script src="//content.jwplatform.com/libraries/IDzF9Zmk.js"></script>
    <div id="player"></div>
    <script>
        jwplayer("player").resize(480, 270);
        jwplayer('player').setup({
            file: https://padmaonline.duckdns.org:8088/T-SportHD/index.m3u8', // Fixed: Added missing quote
            title: 'Esports Live',
            width: '100%',
            aspectratio: '16:9',
            autostart: true,
            primary: 'html5',
            controls: true,
            responsive: true
        });
    </script>
</div>

<script>
    // Sticky Header Logic
    window.onscroll = function() {myFunction()};
    var header = document.getElementById("myHeader");
    var sticky = header.offsetTop;
    function myFunction() {
      if (window.pageYOffset >= sticky) {
        header.classList.add("sticky");
      } else {
        header.classList.remove("sticky");
      }
    }

    // Security: Right-click aur Inspect keys block hain, par embedding allow hai
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('keydown', function(e) {
      if (e.keyCode === 123 || (e.ctrlKey && (e.key === 'u' || e.key === 'I'))) {
        e.preventDefault();
      }
    });
</script>

<script src="/popup.js"></script>
